name: Wheels

# Builds Python wheels via cibuildwheel for the platforms in the matrix
# below. Runs on:
#   - Manual dispatch (workflow_dispatch).
#   - Tag pushes matching v* (release cuts).
#   - Pushes / PRs that touch the binding or the build wiring.
#
# Each matrix row produces one set of wheels (cp39 through cp313 by
# default — see [tool.cibuildwheel].build in pyproject.toml). Wheels
# are uploaded as workflow artifacts; tag builds also publish to PyPI
# via the trusted-publisher OIDC flow (no API tokens stored — the
# environment binding scopes the trust to the `release` env).

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'
    branches:
      - master
    paths:
      - 'pyproject.toml'
      - 'CMakeLists.txt'
      - 'bindings/python/**'
      - 'src/**'
      - 'include/**'
      - 'deps/**'
      - '.github/workflows/wheels.yml'
  pull_request:
    paths:
      - 'pyproject.toml'
      - 'bindings/python/**'
      - '.github/workflows/wheels.yml'

# A second push to the same ref while a build is in flight cancels the
# in-flight one — wheel jobs are slow (10–15 min each) and stale runs
# burn credits.
concurrency:
  group: wheels-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_wheels:
    name: ${{ matrix.os }} / ${{ matrix.arch }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux x86_64 — the bread-and-butter target.
          - os: ubuntu-latest
            arch: x86_64
          # Linux aarch64 — GitHub's native arm runner (free for
          # public repos as of 2025). Faster than QEMU emulation.
          - os: ubuntu-24.04-arm
            arch: aarch64
          # macOS arm64 — Apple Silicon runner. Native build, no
          # cross-compile or universal2 packaging in this commit.
          - os: macos-14
            arch: arm64
          # Windows x64 — MSVC + vcpkg OpenSSL. NEOGRAPH_API decorations
          # in include/neograph/api.h flip to __declspec(dllexport) inside
          # engine TUs (NEOGRAPH_BUILDING_LIBRARY private compile def per
          # library) and __declspec(dllimport) for downstream consumers
          # like the binding. delvewheel bundles the engine .dll +
          # OpenSSL .dll into the wheel via the cibw repair-command.
          - os: windows-latest
            arch: AMD64

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # cibuildwheel reads tags for version tagging

      # MSVC environment for the Windows row only. Without this,
      # CMake (using Ninja per pyproject.toml's CMAKE_GENERATOR=Ninja)
      # picks up MinGW from PATH and the build collapses with
      # "collect2.exe: error: ld returned 1 exit status". The
      # Visual Studio generator activates vcvarsall implicitly, but
      # Ninja does not — so the runner needs MSVC env set up
      # explicitly before cibuildwheel runs.
      - name: Activate MSVC env (Windows only)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      # cibuildwheel pulls the manylinux container image and drives
      # the CMake build inside. All build-time deps (cmake, gcc,
      # OpenSSL headers) are installed by `before-all` in pyproject.toml
      # — no extra system setup needed at the runner level.
      - name: Build wheels (cibuildwheel)
        uses: pypa/cibuildwheel@v2.21
        env:
          CIBW_ARCHS: ${{ matrix.arch }}

      - name: Upload wheel artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 30

  # Build the source distribution alongside wheels. Useful for users
  # on platforms outside the matrix (Windows today, BSDs, exotic
  # archs) who can compile from sdist if they have the C++ toolchain.
  build_sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Build sdist
        run: |
          python -m pip install -U build
          python -m build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error
          retention-days: 30

  # Tag-only PyPI publish via OIDC trusted publishing. Requires the
  # repo's PyPI project to have `fox1245/NeoGraph` registered as a
  # trusted publisher with workflow `wheels.yml` and environment
  # `release`. No API token stored in repo secrets.
  publish_pypi:
    name: Publish to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')
    environment:
      name: release
      url: https://pypi.org/p/neograph-engine
    permissions:
      id-token: write  # OIDC trust to PyPI
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist
