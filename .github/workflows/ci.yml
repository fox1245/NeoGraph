name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel any in-progress run on the same ref when a new push lands —
# a stale CI on an outdated commit is wasted minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # PostgresCheckpointStore integration tests run against this container.
    # The job-level service exposes 5432 inside the runner; tests target it
    # via NEOGRAPH_TEST_POSTGRES_URL below. The DB name matches what
    # tests/test_postgres_checkpoint.cpp expects after drop_schema().
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: neograph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            build-essential \
            libpq-dev \
            libsqlite3-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            pkg-config \
            python3 \
            ccache

      # ccache turns repeat CI runs into mostly-link-time work.
      # 500MB cap avoids cache.actions.io quota issues; warm hit on the
      # 200+ object files saves about 4 minutes per run.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Configure ccache
        run: |
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          ccache --max-size=500M
          ccache --zero-stats

      - name: Configure (Release, all backends on)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DNEOGRAPH_BUILD_LLM=ON \
            -DNEOGRAPH_BUILD_MCP=ON \
            -DNEOGRAPH_BUILD_UTIL=ON \
            -DNEOGRAPH_BUILD_POSTGRES=ON \
            -DNEOGRAPH_BUILD_TESTS=ON \
            -DNEOGRAPH_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: ccache stats
        run: ccache --show-stats

      - name: Run tests (with Postgres)
        working-directory: build
        env:
          # The service container is reachable at localhost:5432 because
          # the job maps the port. drop_schema() inside SetUp wipes any
          # prior state, so this DB starts clean every run.
          NEOGRAPH_TEST_POSTGRES_URL: postgresql://postgres:test@localhost:5432/neograph_test
        run: ctest --output-on-failure -j$(nproc)

      # On failure, surface the raw gtest log so a contributor can debug
      # without re-running locally with PG provisioned.
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────
  # Cross-platform build verification (Stage 3 / Sem 4 follow-up).
  #
  # 2.0 added platform-split code in two places — `src/mcp/client.cpp`
  # (fork/pipe vs CreateProcess/named-pipe) and `src/core/
  # postgres_checkpoint.cpp` (asio::posix vs asio::ip::tcp socket wrap
  # of libpq PQsocket). These jobs prove both branches compile and
  # that the core + async HTTP path runs on macOS and Windows, so
  # contributors editing either branch get CI coverage regardless of
  # which host they build on.
  #
  # Tests skipped here:
  # * Postgres integration — no `services:` container on macOS /
  #   Windows runners; re-enabling later means either a hosted PG or
  #   setup-postgresql action. Build still exercises libpq link.
  # * Full ctest on Windows — MCP stdio test wants python3 and is
  #   covered on Ubuntu already; Windows runs the rest.
  # Native ARM64 ctest gate — the GitHub-hosted ubuntu-24.04-arm runner
  # is a real ARM64 machine (not QEMU), so this catches arch-specific
  # bugs (atomic codegen, alignment, narrow-int wraparound) that an
  # x86_64 runner can't see. PG service is omitted — same trade-off as
  # macOS, the libpq link is exercised via build but the integration
  # tests `GTEST_SKIP` themselves when NEOGRAPH_TEST_POSTGRES_URL isn't
  # set. Mirrors build-and-test (Linux x86_64) otherwise.
  build-and-test-arm64:
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            build-essential \
            libpq-dev \
            libsqlite3-dev \
            libssl-dev \
            libcurl4-openssl-dev \
            pkg-config \
            python3

      - name: Configure (Release, all backends on)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNEOGRAPH_BUILD_LLM=ON \
            -DNEOGRAPH_BUILD_MCP=ON \
            -DNEOGRAPH_BUILD_UTIL=ON \
            -DNEOGRAPH_BUILD_POSTGRES=ON \
            -DNEOGRAPH_BUILD_SQLITE=ON \
            -DNEOGRAPH_BUILD_TESTS=ON \
            -DNEOGRAPH_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: Run tests (no Postgres service — PG cases skip themselves)
        working-directory: build
        run: ctest --output-on-failure -j$(nproc)

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-arm64
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew update
          brew install cmake libpq openssl@3 sqlite curl
          # Homebrew's libpq is keg-only; expose it so CMake's
          # FindPostgreSQL picks it up.
          echo "CMAKE_PREFIX_PATH=$(brew --prefix libpq):$(brew --prefix openssl@3)" >> $GITHUB_ENV

      - name: Configure (all backends on, Postgres build-only)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNEOGRAPH_BUILD_LLM=ON \
            -DNEOGRAPH_BUILD_MCP=ON \
            -DNEOGRAPH_BUILD_UTIL=ON \
            -DNEOGRAPH_BUILD_POSTGRES=ON \
            -DNEOGRAPH_BUILD_TESTS=ON \
            -DNEOGRAPH_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run tests (no Postgres service — PG cases skip themselves)
        working-directory: build
        run: ctest --output-on-failure -j$(sysctl -n hw.ncpu)

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-macos
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    # Windows tier is **alpha** for 2.0.0 — CI gates the Windows-
    # specific code paths (MCP stdio named-pipe + PG async socket
    # wrap) compile-wise, not full integration. Scope is deliberately
    # trimmed so the job finishes in ~5 min on the stock runner:
    #   * Postgres + SQLite backends OFF — both would require vcpkg
    #     to compile openssl/libpq/etc from source, which took ~20
    #     minutes every run (vcpkg's x-gha binary cache backend was
    #     removed upstream). Windows users compile these locally
    #     with their own vcpkg / choco setup.
    #   * OpenSSL comes from the runner's preinstalled copy (choco
    #     installs it by default into `C:\Program Files\OpenSSL-Win64`).
    # This still exercises neograph_core / neograph_async (TLS path) /
    # neograph_mcp (both HTTP and stdio transports) / neograph_llm
    # — the layers with 2.0 Windows-specific code.
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      # Chocolatey's openssl package is a prebuilt binary (no source
      # compile) — installs in ~20 s and lands at a predictable path
      # that CMake's FindOpenSSL picks up via OPENSSL_ROOT_DIR.
      # Faster and more reliable than the mutable "preinstalled on
      # the runner image" story, which drifts between image versions.
      - name: Install OpenSSL (choco, prebuilt)
        shell: pwsh
        run: |
          choco install openssl -y --no-progress
          $ssl = Get-ChildItem "C:\Program Files\OpenSSL*" -Directory |
                 Select-Object -First 1 -ExpandProperty FullName
          if (-not $ssl) { throw "OpenSSL install directory not found" }
          echo "OpenSSL installed at: $ssl"
          "OPENSSL_ROOT_DIR=$ssl" | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Configure (MCP + async only; PG + SQLite + libcurl disabled on Windows CI)
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DOPENSSL_ROOT_DIR="$env:OPENSSL_ROOT_DIR" `
            -DNEOGRAPH_USE_LIBCURL=OFF `
            -DNEOGRAPH_BUILD_LLM=ON `
            -DNEOGRAPH_BUILD_MCP=ON `
            -DNEOGRAPH_BUILD_UTIL=ON `
            -DNEOGRAPH_BUILD_POSTGRES=OFF `
            -DNEOGRAPH_BUILD_SQLITE=OFF `
            -DNEOGRAPH_BUILD_TESTS=ON `
            -DNEOGRAPH_BUILD_EXAMPLES=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j

      - name: Run tests (no Postgres; MCP stdio uses bundled `python`)
        shell: pwsh
        working-directory: build
        run: ctest -C Release --output-on-failure -j

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-windows
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────
  # Async benchmark regression gate (Stage 3 / Sem 4.6).
  #
  # The async wire's value axis is burst concurrency — engine-overhead
  # µs measured by bench_neograph is a secondary guard. CI fails fast
  # if any of the three gates drop below the committed floors on PR,
  # so a regression is caught before merge.
  #
  # Thresholds are intentionally loose (30%+ headroom over measured
  # values on the feat/async-api branch as of 2026-04-21) to tolerate
  # GitHub runner noise. Tighten later with baselined JSON if the
  # numbers prove stable across several weeks of runs.
  #
  # Runs in parallel with build-and-test; separate job so the bench
  # result is isolated from the main test failure mode. Postgres
  # isn't needed here — the benches only exercise the async HTTP
  # layer + engine core.
  bench-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential libssl-dev libcurl4-openssl-dev pkg-config

      - name: Configure (Release, benches on, postgres off)
        run: |
          cmake -B build-bench \
            -DCMAKE_BUILD_TYPE=Release \
            -DNEOGRAPH_BUILD_BENCHMARKS=ON \
            -DNEOGRAPH_BUILD_POSTGRES=OFF \
            -DNEOGRAPH_BUILD_TESTS=OFF

      - name: Build benches
        run: |
          cmake --build build-bench -j$(nproc) \
            --target bench_async_http bench_async_fanout bench_neograph

      - name: Gate — bench_async_http async_pool @ 1000 concur (floor 12000 ops/s)
        run: |
          out=$(./build-bench/bench_async_http --mode async_pool \
                --concur 1000 --rounds 5 --latency-ms 5)
          echo "$out"
          # bench prints `ops/s=  14817.2` with variable spacing — sed
          # pulls out the number after `ops/s=`.
          ops=$(echo "$out" | sed -n 's/.*ops\/s=[[:space:]]*\([0-9.]*\).*/\1/p')
          awk -v v="$ops" 'BEGIN{ if (v+0 < 12000) { print "FAIL: " v " < 12000"; exit 1 } print "ok: " v " >= 12000" }'

      - name: Gate — bench_async_fanout 50K concur (floor 300K ops/s, rss <= 120MB)
        run: |
          out=$(./build-bench/bench_async_fanout --concur 50000)
          echo "$out"
          ops=$(echo "$out" | sed -n 's/.*ops\/s=[[:space:]]*\([0-9.]*\).*/\1/p')
          rss=$(echo "$out" | sed -n 's/.*rss_mb=[[:space:]]*\([0-9.]*\).*/\1/p')
          awk -v v="$ops" 'BEGIN{ if (v+0 < 300000) { print "FAIL ops/s: " v " < 300000"; exit 1 } print "ok ops/s: " v }'
          awk -v v="$rss" 'BEGIN{ if (v+0 > 120)    { print "FAIL rss: "   v " > 120 MB"; exit 1 } print "ok rss: " v " MB" }'

      - name: Gate — bench_neograph (engine overhead ceiling seq 60µs / par 300µs)
        run: |
          out=$(./build-bench/bench_neograph)
          echo "$out"
          # Output: tab-separated `seq<TAB>count<TAB>total_ms<TAB>per_op_us`
          seq_us=$(echo "$out" | awk -F'\t' '$1=="seq" {print $4}')
          par_us=$(echo "$out" | awk -F'\t' '$1=="par" {print $4}')
          awk -v v="$seq_us" 'BEGIN{ if (v+0 > 60)  { print "FAIL seq: " v "us > 60"; exit 1 } print "ok seq: " v "us" }'
          awk -v v="$par_us" 'BEGIN{ if (v+0 > 300) { print "FAIL par: " v "us > 300"; exit 1 } print "ok par: " v "us" }'

  # Compile + ctest under -fsanitize=address,undefined and run the
  # no-network examples in the same configuration. ASan caught a
  # false-positive in the recursion guard during the 2026-04-29 audit
  # (a per-thread depth counter that fired across legitimate subgraph
  # nesting) AND a use-after-scope in run_async's RunConfig
  # parameter (the awaitable held a reference to a stack-local config
  # that callers commonly let go out of scope before co_spawn fired)
  # — without this gate the only line of defence was a one-shot local
  # sweep. Now every PR pays ~5 minutes of build + test under
  # sanitizers, so any future UAF / leak / undefined-behaviour
  # regression fails red before merge.
  #
  # Runs in parallel with build-and-test. Postgres is enabled to
  # exercise the libpq ASan surface (NeoGraph allocates around it,
  # so any PG-path leak shows up here). MCP / HTTP / TLS surfaces
  # are also covered — see tests/lsan_suppressions.txt for the
  # known-leak list from third-party C libraries.
  sanitizer-test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: neograph_test
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential libssl-dev libcurl4-openssl-dev \
            libpq-dev pkg-config

      - name: Configure (Debug + ASan + UBSan, postgres on)
        run: |
          cmake -B build-asan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DNEOGRAPH_BUILD_TESTS=ON \
            -DNEOGRAPH_BUILD_EXAMPLES=ON \
            -DNEOGRAPH_BUILD_BENCHMARKS=OFF \
            -DNEOGRAPH_BUILD_POSTGRES=ON \
            -DCMAKE_CXX_FLAGS="-fsanitize=address,undefined -fno-omit-frame-pointer -O1" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=address,undefined"

      - name: Build (everything)
        run: cmake --build build-asan -j$(nproc)

      - name: Run ctest under ASan + UBSan
        env:
          # detect_leaks=1 enables LSan exit-time check; the few
          # third-party libs we link (libssl, libpq, libcurl) get
          # suppressed via tests/lsan_suppressions.txt.
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=0:abort_on_error=0:strict_init_order=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=0"
          LSAN_OPTIONS: "suppressions=${{ github.workspace }}/tests/lsan_suppressions.txt"
          NEOGRAPH_TEST_POSTGRES_URL: postgresql://postgres:test@localhost:5432/neograph_test
        run: |
          ctest --test-dir build-asan -E "BIG_|valgrind" --output-on-failure

      - name: Run no-network examples under ASan + UBSan
        env:
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=0:abort_on_error=0:strict_init_order=1"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=0"
          LSAN_OPTIONS: "suppressions=${{ github.workspace }}/tests/lsan_suppressions.txt"
        run: |
          set -e
          examples="example_custom_graph example_send_command example_intent_routing
                    example_state_management example_all_features example_subgraph
                    example_checkpoint_hitl example_classifier_fanout
                    example_async_concurrent_runs example_parallel_fanout
                    example_plan_executor"
          for ex in $examples; do
            if [ -x "./build-asan/$ex" ]; then
              echo "::group::$ex"
              timeout 90 "./build-asan/$ex" >/dev/null
              echo "  ok"
              echo "::endgroup::"
            else
              echo "::warning::$ex not built; skipping"
            fi
          done

      - name: Build Python binding with ASan
        run: |
          # Reconfigure with NEOGRAPH_BUILD_PYBIND=ON; binding inherits
          # the same -fsanitize=address,undefined flags from CMAKE_CXX_FLAGS.
          cmake -B build-asan -DNEOGRAPH_BUILD_PYBIND=ON
          cmake --build build-asan -j$(nproc) --target _neograph
          # scikit-build-core normally copies __init__.py into the
          # build dir; do it manually so PYTHONPATH=build-asan works.
          cp bindings/python/neograph_engine/__init__.py \
             build-asan/neograph_engine/__init__.py
          cp bindings/python/neograph_engine/llm.py \
             build-asan/neograph_engine/llm.py 2>/dev/null || true
          cp bindings/python/neograph_engine/streaming.py \
             build-asan/neograph_engine/streaming.py 2>/dev/null || true
          cp bindings/python/neograph_engine/tracing.py \
             build-asan/neograph_engine/tracing.py 2>/dev/null || true

      - name: Set up Python + pytest
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run pytest under ASan + LSan (with interpreter suppressions)
        env:
          # detect_leaks=1 enables LSan exit-time check. Without
          # suppressions Python's intentional caches and pybind11's
          # type-system init swamp the signal — the LSAN_OPTIONS file
          # silences those (third-party only) so any genuine leak in
          # NeoGraph's binding code surfaces.
          ASAN_OPTIONS: "detect_leaks=1:halt_on_error=0:abort_on_error=0:print_suppressions=0"
          UBSAN_OPTIONS: "print_stacktrace=1:halt_on_error=0"
          LSAN_OPTIONS: "suppressions=${{ github.workspace }}/tests/lsan_suppressions.txt"
        run: |
          # The PYTHONPATH=build-asan:bindings/python flow below imports
          # the package without going through `pip install -e .`, so
          # the runtime deps from pyproject.toml are NOT auto-installed.
          # Mirror them here. Keep this in sync with pyproject.toml's
          # ``dependencies = [...]`` list.
          python -m pip install --quiet pytest pydantic certifi
          # libasan must be in LD_PRELOAD so its __cxa_throw interceptor
          # is registered before _neograph.so is dlopen'd by Python.
          # Two tests propagate Python exceptions across the pybind
          # boundary — a known sanitizer limitation
          # (asan_interceptors.cpp:458 CHECK failure on real___cxa_throw
          # not being intercepted) — deselect them by name.
          export LD_PRELOAD=$(gcc -print-file-name=libasan.so)
          export PYTHONPATH=build-asan:bindings/python
          # cancel propagation tests (v0.3.x) throw CancelledException
          # across the engine→Python boundary, hitting the same
          # ``real___cxa_throw == nullptr`` ASan-interceptor CHECK that
          # propagate / undocumented_reducer / noopentelemetry already
          # trip. Add them to the deselect list — the propagation
          # itself is exercised by ctest under TSan and the live LLM
          # cancel tests in non-sanitizer builds.
          python -m pytest bindings/python/tests/ -q \
            -k "not propagate and not undocumented_reducer and not noopentelemetry \
               and not run_async_cancel_does_not_double_resolve_future \
               and not run_stream_async_cancel_does_not_double_resolve_future"

  # ThreadSanitizer race-detection gate. Catches data races that ASan
  # can't see — concurrent reads/writes without happens-before. Caught
  # zero NeoGraph races on first run (after suppressing benign asio /
  # yyjson / OpenSSL library-internal races); fails red on any future
  # regression in the engine's worker pool, scheduler, or
  # CheckpointStore concurrency paths.
  #
  # Separate job from sanitizer-test because TSan and ASan instrument
  # binaries incompatibly (you can't link both into the same artifact).
  # Postgres compiled out — libpq's connection-pool internals trigger
  # asio-shape races we'd suppress anyway, and the value-add over the
  # ASan job's PG coverage is small.
  tsan-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential libssl-dev libcurl4-openssl-dev \
            pkg-config util-linux

      - name: Configure (Debug + TSan, postgres off)
        run: |
          cmake -B build-tsan \
            -DCMAKE_BUILD_TYPE=Debug \
            -DNEOGRAPH_BUILD_TESTS=ON \
            -DNEOGRAPH_BUILD_EXAMPLES=ON \
            -DNEOGRAPH_BUILD_BENCHMARKS=OFF \
            -DNEOGRAPH_BUILD_POSTGRES=OFF \
            -DCMAKE_CXX_FLAGS="-fsanitize=thread -fno-omit-frame-pointer -O1 -g" \
            -DCMAKE_EXE_LINKER_FLAGS="-fsanitize=thread"

      - name: Build (everything)
        run: cmake --build build-tsan -j$(nproc)

      - name: Run ctest under TSan
        env:
          # halt_on_error=0 lets every race be reported in one run
          # rather than aborting on the first; suppressions file
          # silences known-benign library races (asio, yyjson, OpenSSL).
          TSAN_OPTIONS: "halt_on_error=0:second_deadlock_stack=1:suppressions=${{ github.workspace }}/tests/tsan_suppressions.txt"
        run: |
          # `setarch x86_64 -R` clears ADDR_NO_RANDOMIZE — TSan FATALs
          # with "unexpected memory mapping" on kernels with high
          # mmap_rnd_bits (Ubuntu 24.04+ default). The flag inherits
          # through fork, so every test child also gets a TSan-friendly
          # address layout.
          setarch x86_64 -R ctest --test-dir build-tsan \
            -E "BIG_|valgrind" --output-on-failure -j2

      - name: Run no-network examples under TSan
        env:
          TSAN_OPTIONS: "halt_on_error=0:second_deadlock_stack=1:suppressions=${{ github.workspace }}/tests/tsan_suppressions.txt"
        run: |
          set -e
          examples="example_classifier_fanout example_async_concurrent_runs
                    example_parallel_fanout example_send_command
                    example_plan_executor"
          for ex in $examples; do
            if [ -x "./build-tsan/$ex" ]; then
              echo "::group::$ex"
              setarch x86_64 -R timeout 90 "./build-tsan/$ex" >/dev/null
              echo "  ok"
              echo "::endgroup::"
            fi
          done

  # libFuzzer canary — drives GraphCompiler::compile with mutated JSON
  # for 60 seconds. The first run on master HEAD did 1.94 M iterations
  # without crashing. CI re-runs the same pass on every PR, gated to
  # 60 s wall so the job stays under 3 min total. A regression that
  # introduces a parser UB or unhandled exception fails red here.
  #
  # Requires Clang for -fsanitize=fuzzer (libFuzzer ships in Clang's
  # instrumentation runtime). GCC's gcc-fuzz is too narrow.
  fuzz-canary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Clang + build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential clang libssl-dev libcurl4-openssl-dev \
            pkg-config

      - name: Configure (Clang + libFuzzer)
        env:
          CC: clang
          CXX: clang++
        run: |
          cmake -B build-fuzz \
            -DCMAKE_BUILD_TYPE=Debug \
            -DNEOGRAPH_BUILD_TESTS=ON \
            -DNEOGRAPH_BUILD_FUZZ=ON \
            -DNEOGRAPH_BUILD_EXAMPLES=OFF \
            -DNEOGRAPH_BUILD_BENCHMARKS=OFF \
            -DNEOGRAPH_BUILD_POSTGRES=OFF

      - name: Build fuzz target
        run: cmake --build build-fuzz -j$(nproc) --target fuzz_graph_compile

      - name: Fuzz GraphCompiler::compile (60 s wall)
        run: |
          # -max_total_time=60 caps the run; a crash exits non-zero.
          # The seed corpus under tests/fuzz/corpus/graph_compile/ holds
          # canonical valid graph JSONs that libFuzzer mutates from.
          ./build-fuzz/tests/fuzz/fuzz_graph_compile \
            -max_total_time=60 -timeout=10 -seed=42 \
            tests/fuzz/corpus/graph_compile/
