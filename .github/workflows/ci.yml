name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

# Cancel any in-progress run on the same ref when a new push lands —
# a stale CI on an outdated commit is wasted minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # PostgresCheckpointStore integration tests run against this container.
    # The job-level service exposes 5432 inside the runner; tests target it
    # via NEOGRAPH_TEST_POSTGRES_URL below. The DB name matches what
    # tests/test_postgres_checkpoint.cpp expects after drop_schema().
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: test
          POSTGRES_DB: neograph_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 30

    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake \
            build-essential \
            libpq-dev \
            libsqlite3-dev \
            libssl-dev \
            pkg-config \
            python3 \
            ccache

      # ccache turns repeat CI runs into mostly-link-time work.
      # 500MB cap avoids cache.actions.io quota issues; warm hit on the
      # 200+ object files saves about 4 minutes per run.
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: ~/.ccache
          key: ccache-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            ccache-${{ runner.os }}-

      - name: Configure ccache
        run: |
          echo "PATH=/usr/lib/ccache:$PATH" >> $GITHUB_ENV
          ccache --max-size=500M
          ccache --zero-stats

      - name: Configure (Release, all backends on)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_C_COMPILER_LAUNCHER=ccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=ccache \
            -DNEOGRAPH_BUILD_LLM=ON \
            -DNEOGRAPH_BUILD_MCP=ON \
            -DNEOGRAPH_BUILD_UTIL=ON \
            -DNEOGRAPH_BUILD_POSTGRES=ON \
            -DNEOGRAPH_BUILD_TESTS=ON \
            -DNEOGRAPH_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build -j$(nproc)

      - name: ccache stats
        run: ccache --show-stats

      - name: Run tests (with Postgres)
        working-directory: build
        env:
          # The service container is reachable at localhost:5432 because
          # the job maps the port. drop_schema() inside SetUp wipes any
          # prior state, so this DB starts clean every run.
          NEOGRAPH_TEST_POSTGRES_URL: postgresql://postgres:test@localhost:5432/neograph_test
        run: ctest --output-on-failure -j$(nproc)

      # On failure, surface the raw gtest log so a contributor can debug
      # without re-running locally with PG provisioned.
      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────
  # Cross-platform build verification (Stage 3 / Sem 4 follow-up).
  #
  # 2.0 added platform-split code in two places — `src/mcp/client.cpp`
  # (fork/pipe vs CreateProcess/named-pipe) and `src/core/
  # postgres_checkpoint.cpp` (asio::posix vs asio::ip::tcp socket wrap
  # of libpq PQsocket). These jobs prove both branches compile and
  # that the core + async HTTP path runs on macOS and Windows, so
  # contributors editing either branch get CI coverage regardless of
  # which host they build on.
  #
  # Tests skipped here:
  # * Postgres integration — no `services:` container on macOS /
  #   Windows runners; re-enabling later means either a hosted PG or
  #   setup-postgresql action. Build still exercises libpq link.
  # * Full ctest on Windows — MCP stdio test wants python3 and is
  #   covered on Ubuntu already; Windows runs the rest.
  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          brew update
          brew install cmake libpq openssl@3 sqlite
          # Homebrew's libpq is keg-only; expose it so CMake's
          # FindPostgreSQL picks it up.
          echo "CMAKE_PREFIX_PATH=$(brew --prefix libpq):$(brew --prefix openssl@3)" >> $GITHUB_ENV

      - name: Configure (all backends on, Postgres build-only)
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DNEOGRAPH_BUILD_LLM=ON \
            -DNEOGRAPH_BUILD_MCP=ON \
            -DNEOGRAPH_BUILD_UTIL=ON \
            -DNEOGRAPH_BUILD_POSTGRES=ON \
            -DNEOGRAPH_BUILD_TESTS=ON \
            -DNEOGRAPH_BUILD_EXAMPLES=OFF

      - name: Build
        run: cmake --build build -j$(sysctl -n hw.ncpu)

      - name: Run tests (no Postgres service — PG cases skip themselves)
        working-directory: build
        run: ctest --output-on-failure -j$(sysctl -n hw.ncpu)

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-macos
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install libpq + OpenSSL via vcpkg
        shell: pwsh
        run: |
          vcpkg install libpq:x64-windows openssl:x64-windows
          "VCPKG_TOOLCHAIN=$env:VCPKG_INSTALLATION_ROOT\scripts\buildsystems\vcpkg.cmake" `
            | Out-File -Append -Encoding ascii $env:GITHUB_ENV

      - name: Configure (all backends on; Postgres build-only, no service)
        shell: pwsh
        run: |
          cmake -B build `
            -G "Visual Studio 17 2022" -A x64 `
            -DCMAKE_BUILD_TYPE=Release `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_TOOLCHAIN" `
            -DVCPKG_TARGET_TRIPLET=x64-windows `
            -DNEOGRAPH_BUILD_LLM=ON `
            -DNEOGRAPH_BUILD_MCP=ON `
            -DNEOGRAPH_BUILD_UTIL=ON `
            -DNEOGRAPH_BUILD_POSTGRES=ON `
            -DNEOGRAPH_BUILD_TESTS=ON `
            -DNEOGRAPH_BUILD_EXAMPLES=OFF

      - name: Build
        shell: pwsh
        run: cmake --build build --config Release -j

      - name: Run tests (no Postgres; MCP stdio uses bundled `python`)
        shell: pwsh
        working-directory: build
        run: ctest -C Release --output-on-failure -j

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: ctest-logs-windows
          path: build/Testing/Temporary/LastTest.log
          if-no-files-found: ignore

  # ──────────────────────────────────────────────────────────────────
  # Async benchmark regression gate (Stage 3 / Sem 4.6).
  #
  # The async wire's value axis is burst concurrency — engine-overhead
  # µs measured by bench_neograph is a secondary guard. CI fails fast
  # if any of the three gates drop below the committed floors on PR,
  # so a regression is caught before merge.
  #
  # Thresholds are intentionally loose (30%+ headroom over measured
  # values on the feat/async-api branch as of 2026-04-21) to tolerate
  # GitHub runner noise. Tighten later with baselined JSON if the
  # numbers prove stable across several weeks of runs.
  #
  # Runs in parallel with build-and-test; separate job so the bench
  # result is isolated from the main test failure mode. Postgres
  # isn't needed here — the benches only exercise the async HTTP
  # layer + engine core.
  bench-regression:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            cmake build-essential libssl-dev pkg-config

      - name: Configure (Release, benches on, postgres off)
        run: |
          cmake -B build-bench \
            -DCMAKE_BUILD_TYPE=Release \
            -DNEOGRAPH_BUILD_BENCHMARKS=ON \
            -DNEOGRAPH_BUILD_POSTGRES=OFF \
            -DNEOGRAPH_BUILD_TESTS=OFF

      - name: Build benches
        run: cmake --build build-bench -j$(nproc) \
             --target bench_async_http bench_async_fanout bench_neograph

      - name: Gate — bench_async_http async_pool @ 1000 concur (floor 12000 ops/s)
        run: |
          out=$(./build-bench/bench_async_http --mode async_pool \
                --concur 1000 --rounds 5 --latency-ms 5)
          echo "$out"
          # bench prints `ops/s=  14817.2` with variable spacing — sed
          # pulls out the number after `ops/s=`.
          ops=$(echo "$out" | sed -n 's/.*ops\/s=[[:space:]]*\([0-9.]*\).*/\1/p')
          awk -v v="$ops" 'BEGIN{ if (v+0 < 12000) { print "FAIL: " v " < 12000"; exit 1 } print "ok: " v " >= 12000" }'

      - name: Gate — bench_async_fanout 50K concur (floor 300K ops/s, rss <= 120MB)
        run: |
          out=$(./build-bench/bench_async_fanout --concur 50000)
          echo "$out"
          ops=$(echo "$out" | sed -n 's/.*ops\/s=[[:space:]]*\([0-9.]*\).*/\1/p')
          rss=$(echo "$out" | sed -n 's/.*rss_mb=[[:space:]]*\([0-9.]*\).*/\1/p')
          awk -v v="$ops" 'BEGIN{ if (v+0 < 300000) { print "FAIL ops/s: " v " < 300000"; exit 1 } print "ok ops/s: " v }'
          awk -v v="$rss" 'BEGIN{ if (v+0 > 120)    { print "FAIL rss: "   v " > 120 MB"; exit 1 } print "ok rss: " v " MB" }'

      - name: Gate — bench_neograph (engine overhead ceiling seq 60µs / par 300µs)
        run: |
          out=$(./build-bench/bench_neograph)
          echo "$out"
          # Output: tab-separated `seq<TAB>count<TAB>total_ms<TAB>per_op_us`
          seq_us=$(echo "$out" | awk -F'\t' '$1=="seq" {print $4}')
          par_us=$(echo "$out" | awk -F'\t' '$1=="par" {print $4}')
          awk -v v="$seq_us" 'BEGIN{ if (v+0 > 60)  { print "FAIL seq: " v "us > 60"; exit 1 } print "ok seq: " v "us" }'
          awk -v v="$par_us" 'BEGIN{ if (v+0 > 300) { print "FAIL par: " v "us > 300"; exit 1 } print "ok par: " v "us" }'
