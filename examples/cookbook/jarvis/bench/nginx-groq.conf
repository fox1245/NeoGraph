# Groq 경계 계측 프록시 — 콜별 상류(WAN+Groq) 시간을 로깅해서
# 벤치 잔차(= 턴 왕복 − Σ상류시간 = 클라이언트측 순수 시간) 계산에 사용.
#
# 로그 필드: 완료시각(epoch.ms) 전체요청시간 상류연결 상류헤더 상류응답 상태
worker_processes 1;
error_log /dev/stderr warn;
events { worker_connections 256; }

http {
    log_format groqtime '$msec $request_time $upstream_connect_time '
                        '$upstream_header_time $upstream_response_time $status';

    # 상류 keepalive — 프록시→Groq TLS 는 풀에서 재사용 (양쪽 클라이언트에 동일 조건)
    upstream groq {
        server api.groq.com:443;
        keepalive 8;
    }

    server {
        listen 8080;
        access_log /logs/groq.log groqtime;

        location / {
            proxy_pass https://groq;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Host api.groq.com;
            proxy_ssl_server_name on;
            proxy_ssl_name api.groq.com;
            proxy_connect_timeout 15s;
            proxy_read_timeout 180s;
            # 스트리밍 통과 — 버퍼링을 끄면 SSE 청크가 즉시 흐르고
            # $upstream_header_time 이 진짜 첫 바이트(TTFT 근사)가 된다.
            proxy_buffering off;
        }
    }
}
