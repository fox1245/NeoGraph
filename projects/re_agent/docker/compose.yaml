# docker compose -f projects/re_agent/docker/compose.yaml up
#
# Brings up Ghidra GUI in a container with:
#   - X11 forwarded to the host via WSLg socket
#   - Plugin's HTTP server published on 127.0.0.1:8080 (so the host's
#     ghidra-mcp stdio bridge / NeoGraph can hit it the same way as a
#     native install)
#   - The crackme01 self-test target mounted read-only at /samples
#   - Ghidra's per-user state persisted in a named volume so plugin
#     enablement and project layout survive restarts
#
# WSLg notes:
#   /tmp/.X11-unix/X0 is the X11 socket created by WSLg
#   /mnt/wslg holds the runtime dir referenced by some apps
#   DISPLAY=:0 on WSLg is the WSLg-provided X server

services:
  ghidra:
    build:
      context: .
      dockerfile: Dockerfile
    image: neograph-re/ghidra:11.4.3
    container_name: neograph-re-ghidra
    init: true
    cpus: 2
    mem_limit: 4g
    environment:
      - DISPLAY=${DISPLAY:-:0}
      - MAXMEM=4G
    ports:
      # Host 18080 → container 8080 (plugin's default). 8080 on this host is
      # often grabbed by other dev containers; 18080 keeps us out of the way.
      - "127.0.0.1:18080:8080"
    volumes:
      # X11 forwarding (WSLg).
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - /mnt/wslg:/mnt/wslg:rw
      # Self-test target (read-only — agent shouldn't be able to clobber it).
      - ../targets:/samples:ro
      # External binaries the agent can analyze. Mounted read-only so the
      # agent (and Ghidra) can never write back to host source trees.
      # Add new entries here as new analysis targets show up.
      - /root/Coding/smart_translator/j2k/engine:/external/j2k:ro
      # Persisted per-user Ghidra state (plugin enablement, projects, prefs).
      - ghidra-home:/root
    # Base image's CMD is "client" → opens the Ghidra GUI.

volumes:
  ghidra-home:
    name: neograph-re-ghidra-home
